# Inner tmux config — the "tabs" pane in a nested setup with the outer
# (~/.tmux.conf) session. Launched by `C-a C-t` in outer, which runs:
#   tmux -L inner -f ~/.tmux.inner.conf new-session -A -s main
#
# Mental model:
#   - Outer = layout (nvim on top, this pane on bottom).
#   - Inner = tabs. Each inner *window* is a tab.
#   - Cross-layer pane movement still uses outer's C-a <Arrow> — it works from
#     here because outer always sees keys first, intercepts C-a, and its
#     is_vim check returns false on this pane (which runs tmux, not vim).
#   - Tab switching uses no-prefix M-keys; outer doesn't bind them so they
#     fall through to inner.

# Prefix
set -g prefix C-e
unbind C-b
bind-key C-e send-prefix

# Reload
unbind r
bind r source-file ~/.tmux.inner.conf

# Highlight color for selection in tree-mode (prefix-w, prefix-s) and
# copy-mode: white-ish bar with dark fg, replacing the harsh default yellow.
set -g mode-style 'fg=#21252b,bg=#abb2bf,bold'

# Prompt + message style (e.g. `prefix t` rename-tab prompt) match the
# active-tab palette so they blend with the status bar instead of using
# tmux's default `bg=yellow,fg=black`.
set -g message-style 'fg=#abb2bf,bg=#3b3f4c'
set -g message-command-style 'fg=#abb2bf,bg=#3b3f4c'

# Cheatsheet: prefix-? opens a centered popup listing every prefix binding.
bind-key ? display-popup -E -h 80% -w 80% "tmux -L inner list-keys -T prefix | sort | less -R"

# Behavior — mirror outer for a consistent feel.
set -s escape-time 1
set -g focus-events on
set -g mouse on
set -g history-limit 10000
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Extended keys (Shift+Enter / Ctrl+Enter for Claude Code & nvim).
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys,screen*:extkeys'

# Colors
set -g default-terminal "screen-256color"
set-option -sa terminal-overrides ",xterm*:Tc"

# OSC 8 hyperlink passthrough — see outer ~/.tmux.conf for full notes.
set -as terminal-features ',*:hyperlinks'

# Kitty graphics passthrough — see outer ~/.tmux.conf for full notes.
# Both inner AND outer need this since the escapes traverse both servers.
set -g allow-passthrough on

# Mouse wheel: 1 line per tick in copy-mode (default is 5).
bind-key -T copy-mode-vi WheelUpPane   send-keys -X -N 1 scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X -N 1 scroll-down
bind-key -T copy-mode    WheelUpPane   send-keys -X -N 1 scroll-up
bind-key -T copy-mode    WheelDownPane send-keys -X -N 1 scroll-down

# Clipboard: mouse-drag selects → release copies to system clipboard via OSC52.
# The outer tmux (also `set-clipboard on`) forwards our OSC52 up to Ghostty.
# Pattern must match `default-terminal` (screen-256color) — tmux gates OSC52
# emission on the `Ms` terminfo cap which this feature flag enables.
set -g set-clipboard on
set -as terminal-features 'screen*:clipboard'
bind-key -T copy-mode    MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# --- Tabs (= inner windows), no-prefix shortcuts -----------------------------
# Outer never binds these, so they fall through.
bind -n M-h previous-window
bind -n M-l next-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Prefix-based tab navigation/reordering — mirror outer's window bindings so
# the muscle memory carries across layers. Without these, `C-e ,` falls
# through to tmux's default rename-window prompt and `C-e <`/`>` are unbound.
unbind ,
unbind .
unbind <
unbind >
bind-key -r , previous-window
bind-key -r . next-window
bind-key -r < swap-window -d -t -1
bind-key -r > swap-window -d -t +1

# New tab in current pane's directory.
bind c new-window -c "#{pane_current_path}"

# Rename tab and pin (disable automatic-rename so the custom name sticks).
unbind t
bind-key t command-prompt -p "Rename tab:" "rename-window '%%' ; setw automatic-rename off"
bind-key T command-prompt -p "Rename tab (styled):" "rename-window '#[fg=green,bold]%%#[fg=default,nobold]' ; setw automatic-rename off"

# Pane splits inside a tab — model says inner = tabs only, but kept for ad-hoc use.
unbind '"'
unbind %
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Prefix + Arrow → move between panes inside this inner server, OR escape
# back to the outer server when this pane is at the corresponding edge.
# Edge detection uses `#{pane_at_*}` (returns "1" when this pane has no
# neighbour in that direction). When at the edge we run `tmux select-pane`
# on the *default* socket — that's the outer server — moving its focus to
# the next outer pane. `TMUX=` is required so the nested-tmux guard
# doesn't refuse the call. Receiving end of outer's `is_inner_tmux` chain
# too: outer's C-a <Arrow> forwards as C-e <Arrow> and lands here.
bind-key Up    if-shell -F '#{pane_at_top}'    "run-shell 'TMUX= tmux select-pane -U'" "select-pane -U"
bind-key Down  if-shell -F '#{pane_at_bottom}' "run-shell 'TMUX= tmux select-pane -D'" "select-pane -D"
bind-key Left  if-shell -F '#{pane_at_left}'   "run-shell 'TMUX= tmux select-pane -L'" "select-pane -L"
bind-key Right if-shell -F '#{pane_at_right}'  "run-shell 'TMUX= tmux select-pane -R'" "select-pane -R"

# --- Tab bar (status) --------------------------------------------------------
# No status bg, tabs left-aligned, prefix dot on the right. Tab visuals use
# the same powerline.sh renderer as outer (read straight from the outer's
# installed plugin) so window styling stays consistent across nesting layers
# without loading TPM in this inner server.
set-option -g status-position top
set-option -g status-interval 5
set-option -g status-justify left
set-option -g status-style bg=default

# Same active-window-index tracking as outer — drives the vim-style smooth
# transition cap on the inactive tab right before the active one. `set-option`
# doesn't expand `#{window_index}`; round-trip via `run-shell` which does.
set -g @active_window_index 1
set-hook -g session-window-changed 'run-shell "tmux set -g @active_window_index #{window_index}"'
set-hook -g client-attached        'run-shell "tmux set -g @active_window_index #{window_index}"'
set-hook -g after-select-window    'run-shell "tmux set -g @active_window_index #{window_index}"'
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{P:#{?#{!=:#{b:pane_current_path},casper},#{b:pane_current_path},~}#{?#{!=:#{pane_current_command},zsh}, #[fg=green]#{pane_current_command}#[fg=default],}#{?#{!=:#{pane_index},#{window_panes}}, | ,},#[bold]#{?window_zoomed_flag, ,}#{?#{!=:#{b:pane_current_path},casper},#{b:pane_current_path},~}#{?#{!=:#{pane_current_command},zsh}, #[fg=green]#{pane_current_command}#[fg=default],}#[nobold]#{?#{!=:#{pane_index},#{window_panes}}, | ,}}'
# Inline-conditional cap: each ternary branch is a single colour or glyph,
# never a `#[…]` style block. Wrapping a whole style in `#{?cond,A,B}`
# forces tmux to escape commas as `,,`; tmux 3.5 unescapes them before
# parsing, but tmux 3.6 leaves them in, the style parser hits empty tokens
# and the tail (`nounderscore]`) renders as literal text on the inactive
# tab before the active one. Bridge cap is U+E0B4 (right-bulging filled,
# same glyph as the active tab's own right cap) with fg=#282C34 (One Half
# Dark terminal bg — hardcoded; update if the terminal scheme changes) and
# bg=#3b3f4c: the disc on the LEFT half reads as a 'cutout' blending into
# terminal bg, the cell bg on the RIGHT half connects into the active tab
# body. Thin cap is U+E0B5 (outline) over fg=#5c6370/bg=default.
set -wg window-status-format '#[fg=#abb2bf,bg=default,nobold,noitalics,nounderscore]#{?window_zoomed_flag,  , }#W #[fg=#{?#{e|==:#{e|+:#{window_index},1},#{@active_window_index}},#282C34,#5c6370},bg=#{?#{e|==:#{e|+:#{window_index},1},#{@active_window_index}},#3b3f4c,default},nobold,noitalics,nounderscore]#{?#{e|==:#{e|+:#{window_index},1},#{@active_window_index}},,}'
set -wg window-status-current-format '#[fg=#abb2bf,bg=#3b3f4c,nobold,noitalics,nounderscore]#{?window_zoomed_flag,  , }#W #[fg=#3b3f4c,bg=default,nobold,noitalics,nounderscore]'
# Drop tmux's default 1-space window-status-separator so the bridge cap
# sits flush against the active tab's body. The thin-cap glyph still
# separates two adjacent inactive tabs.
set-window-option -g window-status-separator ''
# Session-name trailing cap, same attribute-level conditional shape.
set-option -g status-left '#[fg=#21252b,bg=#98c379] #S #[fg=#98c379,bg=#{?#{==:#{@active_window_index},1},#3b3f4c,default},nobold,noitalics,nounderscore]#[default]'
set-option        -g status-left-length           60
set-option        -g status-right                 '#[fg=colour240]C-e #[default]#{?client_prefix,#[fg=red]●#[default],#[fg=colour240]●#[default]} '
